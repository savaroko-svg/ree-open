name: Build Mod Menu Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Author Mistakes (Delete Local Settings & Fix Formats)
      run: |
        rm -f local.properties
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Compile Project
      run: ./gradlew assembleRelease

    - name: Upload Everything
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Compiled-Files
        path: |
          **/*.apk
          **/*.so
          
